name: Supabase Keep-Alive

on:
  schedule:
    # Runs every day at noon UTC (5am Pacific)
    - cron: '0 12 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent inactivity pause
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/bookslist?select=count" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "Supabase ping response: $RESPONSE"
          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Supabase is alive and responding"
          else
            echo "⚠️ Unexpected response code: $RESPONSE"
            exit 1
          fi
